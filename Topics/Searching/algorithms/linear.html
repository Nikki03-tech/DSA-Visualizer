<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Linear Search Visualizer</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #e0f7fa, #e3f2fd, #fce4ec);
        margin: 0;
        padding: 20px;
        color: #333;
      }

      h2 {
        text-align: center;
        margin-bottom: 15px; /* blue-purple */

        font-size: 28px;
        font-weight: bold;
      }
      /* Controls */
      #controls {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 15px;
      }
      input,
      button,
      label {
        font-size: 14px;
      }
      input {
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      /* Buttons */
      button {
        cursor: pointer;
        background: linear-gradient(
          135deg,
          #6a11cb,
          #2575fc
        ); /* same as heading */
        border: none;
        color: white;
        border-radius: 6px;
        font-weight: bold;
        padding: 6px 12px;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s, box-shadow 0.3s;
      }
      button:hover {
        transform: scale(1.05);
        box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.25);
        background: linear-gradient(
          135deg,
          #2575fc,
          #6a11cb
        ); /* reverse gradient */
      }

      /* Dashboard Layout */
      .dashboard {
        display: grid;
        grid-template-columns: 2fr 1fr;
        grid-template-rows: auto auto;
        gap: 15px;
        max-width: 1100px;
        margin: auto;
      }

      /* Visualization merged with execution */
      #visualization {
        grid-column: 1 / 2;
        grid-row: 1 / 2;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 120px;
        background: #fff;
        border: 1px solid #ccc;
        border-bottom: none; /* merge */
        border-radius: 8px 8px 0 0;
        padding: 12px;
        gap: 10px;
      }

      /* Boxes */
      .box {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 55px;
        height: 55px;
        border: 2px solid #ff6f61;
        border-radius: 10px;
        font-weight: bold;
        font-size: 16px;
        background-color: #fff5f5;
        transition: all 0.3s ease;
      }
      .box.current {
        background: #ffb74d;
        color: white;
        border-color: #fb8c00;
      }
      .box.checked {
        background: #ef9a9a;
        color: white;
        border-color: #c62828;
      }
      .box.found {
        background: #66bb6a;
        color: white;
        border-color: #2e7d32;
      }

      /* Step-by-step execution */
      #stepPanel {
        grid-column: 1 / 2;
        grid-row: 2 / 3;
        background: #f9f9f9cc;
        border: 1px solid #ccc;
        border-top: none;
        border-radius: 0 0 8px 8px;
        padding: 12px;
        font-size: 14px;
        min-height: 100px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(4px);
      }

      /* Logic panel */
      #logicPanel {
        grid-column: 2 / 3;
        grid-row: 1 / 2;
        height: 300px;
        background: #ffffffcc;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px;
        overflow-y: auto;
        font-size: 14px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(4px);
      }

      /* Summary */
      #summaryPanel {
        grid-column: 2 / 3;
        grid-row: 2 / 3;
        height: 200px;
        background: #ffffffcc;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px;
        overflow-y: auto;
        font-size: 14px;
        display: none;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(4px);
      }

      pre {
        margin: 0;
        font-size: 13px;
        color: #444;
      }

      /* Back button */
      .back-button {
        display: inline-block;
        margin: 10px;
        padding: 10px 20px;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        font-weight: bold;
        transition: transform 0.3s, background 0.3s;
      }
      .back-button:hover {
        transform: scale(1.05);
        background: linear-gradient(135deg, #2575fc, #6a11cb);
      }
    </style>
  </head>
  <body>
    <a href="../index.html" class="back-button">⬅ Back to Searching Menu</a>

    <h2>🔍 Linear Search Visualizer</h2>

    <!-- Controls -->
    <div id="controls">
      <input type="text" id="userInput" value="5,3,8,4,2" size="30" />
      <input
        type="text"
        id="targetInput"
        value="4"
        size="10"
        placeholder="Target"
      />
      <button onclick="startLinearSearch()">Start</button>
      <button onclick="resetVisualizer()">Reset</button>
      <label
        >Speed:
        <input
          type="range"
          id="speedSlider"
          min="200"
          max="2000"
          step="100"
          value="800"
        />
      </label>
    </div>

    <!-- Dashboard -->
    <div class="dashboard">
      <div id="visualization"></div>

      <div id="logicPanel">
        <b>Linear Search Logic:</b>
        <pre>
for i from 0 to n-1:
    if arr[i] == target:
        return i
return -1
      </pre
        >
      </div>

      <div id="stepPanel">
        <b>Step-by-step Execution:</b>
        <p id="logicText">Steps will appear here...</p>
      </div>

      <div id="summaryPanel">
        <b>Summary:</b>
        <ul id="summaryList"></ul>
      </div>
    </div>

    <script>
      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function startLinearSearch() {
        const input = document.getElementById("userInput").value.trim();
        const target = parseInt(
          document.getElementById("targetInput").value,
          10
        );
        let arr = input.split(",").map((num) => parseInt(num, 10));
        let container = document.getElementById("visualization");
        let logicPanel = document.getElementById("logicText");
        let speed = parseInt(document.getElementById("speedSlider").value);
        let summaryPanel = document.getElementById("summaryPanel");
        let summaryList = document.getElementById("summaryList");

        // Reset
        container.innerHTML = "";
        logicPanel.innerText = "Steps will appear here...";
        summaryPanel.style.display = "none";
        summaryList.innerHTML = "";

        // Create boxes
        arr.forEach((value) => {
          let box = document.createElement("div");
          box.classList.add("box");
          box.innerText = value;
          container.appendChild(box);
        });

        let boxes = container.childNodes;
        let steps = [];
        let found = false;

        // Linear Search Animation
        for (let i = 0; i < arr.length; i++) {
          boxes[i].classList.add("current");
          logicPanel.innerText = `Checking index ${i}: ${arr[i]}`;
          steps.push(`Checked ${arr[i]} at index ${i}`);
          await sleep(speed);

          if (arr[i] === target) {
            logicPanel.innerText = `✅ Found ${target} at index ${i}`;
            boxes[i].className = "box found";
            steps.push(`Found ${target} at index ${i}`);
            found = true;
            break;
          } else {
            boxes[i].className = "box checked";
          }
          await sleep(speed);
        }

        if (!found) {
          logicPanel.innerText = `❌ ${target} not found in array`;
          steps.push(`${target} not found in array`);
        }

        summaryPanel.style.display = "block";
        steps.forEach((s) => {
          let li = document.createElement("li");
          li.innerText = s;
          summaryList.appendChild(li);
        });
      }

      function resetVisualizer() {
        document.getElementById("visualization").innerHTML = "";
        document.getElementById("logicText").innerText =
          "Steps will appear here...";
        document.getElementById("summaryPanel").style.display = "none";
        document.getElementById("summaryList").innerHTML = "";
      }
    </script>
  </body>
</html>
