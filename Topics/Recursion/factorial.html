<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Factorial Recursion Visualizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec, #e0f7fa);
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #d81b60;
    }

    #controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input, button, label {
      font-size: 14px;
    }

    input {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
      background: linear-gradient(135deg, #d81b60, #f06292);
      border: none;
      color: white;
      border-radius: 6px;
      font-weight: bold;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }

    .dashboard {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: auto auto;
      gap: 15px;
      max-width: 1100px;
      margin: auto;
    }

    #stackPanel {
      background: #fff;
      border: 1px solid #ccc;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      min-height: 150px;
      padding: 12px;
      display: flex;
      flex-direction: column-reverse; /* stack grows downward visually */
      gap: 8px;
      overflow-y: auto;
    }

    .call-box {
      background: #f06292;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s;
    }
    .current { background: #d81b60; }
    .returned { background: #4caf50; }

    #stepPanel {
      grid-column: 1 / 2;
      grid-row: 2 / 3;
      background: #fff0f5cc;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 12px;
      font-size: 14px;
      min-height: 100px;
    }

    #summaryPanel {
      grid-column: 2 / 3;
      grid-row: 1 / 3;
      background: #ffffffcc;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
    }

    .back-button {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.3s;
    }
    .back-button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <a href="../index.html" class="back-button">⬅ Back to Recursion Menu</a>

  <h2>📌 Factorial Recursion Visualizer</h2>

  <div id="controls">
    <input type="number" id="numberInput" value="5" min="0" />
    <button onclick="startFactorial()">Start</button>
    <button onclick="resetVisualizer()">Reset</button>
    <label>
      Speed:
      <input type="range" id="speedSlider" min="200" max="2000" step="100" value="800">
    </label>
  </div>

  <div class="dashboard">
    <div id="stackPanel"></div>
    <div id="stepPanel"><b>Step-by-step Execution:</b><p id="logicText">Steps will appear here...</p></div>
    <div id="summaryPanel">
      <b>Summary:</b>
      <p id="finalResult">Result will appear here...</p>
    </div>
  </div>

  <script>
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startFactorial() {
      let n = parseInt(document.getElementById("numberInput").value);
      let speed = parseInt(document.getElementById("speedSlider").value);
      let stackPanel = document.getElementById("stackPanel");
      let logicText = document.getElementById("logicText");
      let finalResult = document.getElementById("finalResult");

      stackPanel.innerHTML = "";
      logicText.innerText = "Steps will appear here...";
      finalResult.innerText = "";

      async function factorial(n) {
        let box = document.createElement("div");
        box.classList.add("call-box", "current");
        box.innerText = `factorial(${n}) called`;
        stackPanel.appendChild(box);
        logicText.innerText = `Entered factorial(${n})`;
        await sleep(speed);

        if (n === 0 || n === 1) {
          box.classList.remove("current");
          box.classList.add("returned");
          box.innerText = `factorial(${n}) = 1`;
          logicText.innerText = `Base case reached: factorial(${n}) = 1`;
          await sleep(speed);
          return 1;
        } else {
          let res = await factorial(n - 1);
          box.classList.remove("current");
          box.classList.add("returned");
          box.innerText = `factorial(${n}) = ${n} * ${res} = ${n*res}`;
          logicText.innerText = `Returning factorial(${n}) = ${n*res}`;
          await sleep(speed);
          return n * res;
        }
      }

      let result = await factorial(n);
      finalResult.innerText = `Factorial(${n}) = ${result}`;
    }

    function resetVisualizer() {
      document.getElementById("stackPanel").innerHTML = "";
      document.getElementById("logicText").innerText = "Steps will appear here...";
      document.getElementById("finalResult").innerText = "";
    }
  </script>
</body>
</html>
